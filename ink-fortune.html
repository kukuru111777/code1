<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨迹命理</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink-black: #1a1a1a;
            --ink-gray: #4a4a4a;
            --paper-light: #f5f0e6;
            --paper-medium: #e8e0d0;
            --ink-wash: rgba(26, 26, 26, 0.1);
        }

        body {
            font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', serif;
            background: var(--paper-light);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: none;
            position: relative;
        }

        /* 宣纸纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(ellipse at 20% 30%, var(--ink-wash) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--ink-wash) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 20%, var(--ink-wash) 0%, transparent 40%),
                radial-gradient(ellipse at 30% 80%, var(--ink-wash) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* 自定义光标 */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--ink-black) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: multiply;
            transition: transform 0.1s ease;
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--ink-black);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
        }

        /* 墨烟拖尾效果 */
        .ink-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, rgba(26, 26, 26, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: fadeTrail 1.5s ease-out forwards;
        }

        @keyframes fadeTrail {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(2);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--ink-black);
            font-weight: normal;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--ink-gray);
            letter-spacing: 0.2em;
        }

        /* 输入区域 */
        .input-section {
            background: rgba(232, 224, 208, 0.5);
            padding: 60px 40px;
            padding-bottom: 80px;
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(26, 26, 26, 0.1),
                0 10px 40px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
            position: relative;
            min-height: 480px;
            overflow: visible;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 1.3rem;
            color: var(--ink-gray);
            margin-bottom: 40px;
            letter-spacing: 0.15em;
            text-align: center;
        }

        /* 斜向布局容器 */
        .date-inputs {
            position: relative;
            width: 100%;
            height: 380px;
            min-height: 380px;
        }

        /* 选择器项 */
        .date-selector {
            position: absolute;
            width: 140px;
            text-align: center;
            cursor: none;
            transition: all 0.3s ease;
        }

        .date-selector:nth-child(4) {
            top: 0;
            left: calc(50% - 135px);
        }

        .date-selector:nth-child(5) {
            top: 80px;
            left: calc(50% - 45px);
        }

        .date-selector:nth-child(6) {
            top: 160px;
            left: calc(50% + 45px);
        }

        .date-selector:nth-child(7) {
            top: 240px;
            left: calc(50% + 135px);
        }

        /* 选择器标签 */
        .selector-label {
            font-size: 1rem;
            color: var(--ink-gray);
            margin-bottom: 8px;
            letter-spacing: 0.3em;
            opacity: 0.7;
        }

        /* 选择器值显示 */
        .selector-value {
            position: relative;
            font-size: 1.5rem;
            color: var(--ink-black);
            letter-spacing: 0.2em;
            padding: 10px 0;
            border-bottom: 2px solid rgba(74, 74, 74, 0.3);
            transition: all 0.3s ease;
            background: transparent;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selector-value::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--ink-black);
            transition: width 0.3s ease;
        }

        .selector-value:hover::after {
            width: 100%;
        }

        /* 已选中状态 */
        .date-selector.selected .selector-value {
            background: rgba(26, 26, 26, 0.05);
            border-radius: 8px 8px 0 0;
        }

        .date-selector.selected .selector-label {
            color: var(--ink-black);
            opacity: 1;
        }

        /* 占位符状态 */
        .selector-value.placeholder {
            color: rgba(74, 74, 74, 0.5);
            font-size: 1.2rem;
        }

        /* 气韵连接线 */
        .qi-line {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        .qi-line-1 {
            top: 40px;
            left: calc(50% - 75px);
            width: 80px;
            height: 50px;
            border-right: 1px dashed rgba(26, 26, 26, 0.15);
            border-bottom: 1px dashed rgba(26, 26, 26, 0.15);
            border-radius: 0 0 20px 0;
        }

        .qi-line-2 {
            top: 120px;
            left: calc(50% + 15px);
            width: 50px;
            height: 50px;
            border-right: 1px dashed rgba(26, 26, 26, 0.15);
            border-bottom: 1px dashed rgba(26, 26, 26, 0.15);
            border-radius: 0 0 20px 0;
        }

        .qi-line-3 {
            top: 200px;
            left: calc(50% + 105px);
            width: 50px;
            height: 50px;
            border-right: 1px dashed rgba(26, 26, 26, 0.15);
            border-bottom: 1px dashed rgba(26, 26, 26, 0.15);
            border-radius: 0 0 20px 0;
        }

        /* 古风弹窗选择列表 */
        .ancient-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: top;
            width: 200px;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(245, 240, 230, 0.98);
            border: 1px solid rgba(26, 26, 26, 0.2);
            border-radius: 0 0 10px 10px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(26, 26, 26, 0.02);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            cursor: none;
        }

        .ancient-dropdown.show {
            transform: translateX(-50%) scaleY(1);
            opacity: 1;
        }

        .dropdown-item {
            padding: 12px 20px;
            font-family: 'Ma Shan Zheng', 'KaiTi', serif;
            font-size: 1.1rem;
            color: var(--ink-gray);
            border-bottom: 1px solid rgba(26, 26, 26, 0.05);
            transition: all 0.2s ease;
            cursor: none;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: rgba(26, 26, 26, 0.05);
            color: var(--ink-black);
            padding-left: 25px;
        }

        .dropdown-item.selected {
            background: rgba(26, 26, 26, 0.08);
            color: var(--ink-black);
            font-weight: bold;
        }

        /* 隐藏原生select */
        .hidden-select {
            display: none;
        }

        /* 水墨晕染按钮 */
        .calculate-btn {
            width: 100%;
            padding: 20px;
            font-family: 'Ma Shan Zheng', 'KaiTi', serif;
            font-size: 1.8rem;
            color: var(--paper-light);
            background: var(--ink-black);
            border: none;
            border-radius: 50px;
            cursor: none;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            letter-spacing: 0.3em;
        }

        .calculate-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(245, 240, 230, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.6s ease;
        }

        .calculate-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .calculate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(26, 26, 26, 0.3);
        }

        /* 墨滴扩散动画 */
        .ink-drop {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(26, 26, 26, 0.2) 0%, transparent 70%);
            pointer-events: none;
            animation: inkSpread 1.5s ease-out forwards;
        }

        /* 印章闪烁动画 */
        @keyframes sealFlash {
            0%, 100% {
                transform: scale(1) rotate(-15deg);
                box-shadow:
                    0 4px 15px rgba(200, 50, 50, 0.4),
                    inset 0 0 20px rgba(0, 0, 0, 0.2);
            }
            50% {
                transform: scale(1.15) rotate(-15deg);
                box-shadow:
                    0 8px 30px rgba(200, 50, 50, 0.8),
                    0 0 60px rgba(200, 50, 50, 0.6),
                    inset 0 0 40px rgba(245, 240, 230, 0.4);
            }
        }

        @keyframes inkSpread {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            100% {
                width: 100px;
                height: 100px;
                opacity: 0;
            }
        }

        /* 结果显示区域 */
        .result-section {
            background: rgba(232, 224, 208, 0.5);
            padding: 50px;
            padding-bottom: 140px;
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(26, 26, 26, 0.1),
                0 10px 40px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            display: none;
            position: relative;
            overflow: visible;
        }

        .result-section.show {
            display: block;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 2rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 0.3em;
        }

        .fortune-content {
            font-size: 1.4rem;
            line-height: 2;
            color: var(--ink-gray);
            letter-spacing: 0.1em;
        }

        .fortune-text {
            opacity: 0;
            transform: translateY(10px);
            margin-bottom: 20px;
            filter: blur(8px);
        }

        .fortune-text.show {
            animation: inkBleed 2s ease forwards;
        }

        @keyframes inkBleed {
            0% {
                opacity: 0;
                filter: blur(8px);
                transform: translateY(10px) scale(0.98);
            }
            30% {
                opacity: 0.4;
                filter: blur(6px);
            }
            60% {
                opacity: 0.7;
                filter: blur(3px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0) scale(1);
            }
        }

        .eight-characters {
            text-align: center;
            font-size: 2.5rem;
            color: var(--ink-black);
            margin: 30px 0;
            letter-spacing: 0.5em;
            padding: 20px;
            background: rgba(245, 240, 230, 0.8);
            border-radius: 10px;
        }

        .analysis {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(74, 74, 74, 0.2);
        }

        .analysis-item {
            margin-bottom: 25px;
        }

        .analysis-label {
            font-size: 1.1rem;
            color: var(--ink-black);
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }

        .analysis-text {
            font-size: 1.2rem;
            color: var(--ink-gray);
            line-height: 1.8;
        }

        /* 朱砂印章 */
        .result-seal {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #c83232 0%, #a02828 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            box-shadow:
                0 4px 15px rgba(200, 50, 50, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
            opacity: 0;
            transform: scale(0.8) rotate(-15deg);
        }

        .result-seal.show {
            opacity: 1;
            transform: scale(1) rotate(-15deg);
        }

        .result-seal:hover {
            transform: scale(1.05) rotate(-15deg);
            box-shadow:
                0 6px 25px rgba(200, 50, 50, 0.6),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .result-seal-text {
            font-size: 2.5rem;
            color: #f5f0e6;
            font-family: 'Ma Shan Zheng', serif;
            letter-spacing: 0.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* 印章纹理 */
        .result-seal::before {
            content: '';
            position: absolute;
            inset: 3px;
            border: 2px solid rgba(245, 240, 230, 0.3);
            border-radius: 6px;
            pointer-events: none;
        }

        .result-seal::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.03) 3px,
                    rgba(0, 0, 0, 0.03) 6px
                );
            border-radius: 8px;
            pointer-events: none;
        }

        /* 五行损益展示 */
        .five-elements {
            background: rgba(245, 240, 230, 0.8);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .five-elements-title {
            font-size: 1.3rem;
            color: var(--ink-black);
            margin-bottom: 15px;
            letter-spacing: 0.3em;
        }

        .five-elements-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .element-item {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1rem;
            letter-spacing: 0.1em;
        }

        .element-gold { background: #f0e6d3; color: #8b7355; }
        .element-wood { background: #e8f5e9; color: #2e7d32; }
        .element-water { background: #e3f2fd; color: #1565c0; }
        .element-fire { background: #ffebee; color: #c62828; }
        .element-earth { background: #fff3e0; color: #ef6c00; }

        .five-elements-advice {
            font-size: 1.1rem;
            color: var(--ink-gray);
            line-height: 1.6;
            font-style: italic;
        }

        /* 流年运势 */
        .year-fortune {
            background: linear-gradient(135deg, rgba(255, 248, 220, 0.6) 0%, rgba(245, 240, 230, 0.6) 100%);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid var(--ink-black);
        }

        .year-fortune-text {
            font-size: 1.3rem;
            color: var(--ink-black);
            line-height: 1.8;
            letter-spacing: 0.1em;
        }

        /* 智慧格言 */
        .wisdom-quote {
            text-align: center;
            font-size: 1.5rem;
            color: var(--ink-black);
            margin: 30px 0;
            padding: 20px;
            background: rgba(232, 224, 208, 0.5);
            border-radius: 10px;
            letter-spacing: 0.2em;
            font-style: italic;
        }

        /* 重新测算按钮 */
        .recalculate-btn {
            width: 100%;
            padding: 15px;
            font-family: 'Ma Shan Zheng', 'KaiTi', serif;
            font-size: 1.3rem;
            color: var(--ink-gray);
            background: transparent;
            border: 2px solid var(--ink-gray);
            border-radius: 50px;
            cursor: none;
            margin-top: 20px;
            transition: all 0.3s ease;
            letter-spacing: 0.2em;
        }

        .recalculate-btn:hover {
            background: var(--ink-gray);
            color: var(--paper-light);
            transform: scale(1.02);
        }

        .recalculate-btn.hidden {
            display: none;
        }

        /* 城市推荐卡片 */
        .city-recommendation {
            background: linear-gradient(135deg,
                rgba(245, 240, 230, 0.7) 0%,
                rgba(232, 224, 208, 0.7) 100%);
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            border: 1px solid rgba(26, 26, 26, 0.1);
        }

        .city-rec-title {
            font-size: 1.4rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.3em;
        }

        .city-rec-subtitle {
            font-size: 1rem;
            color: var(--ink-gray);
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
        }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .city-item {
            background: rgba(245, 240, 230, 0.9);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid var(--ink-black);
            transition: all 0.3s ease;
        }

        .city-item:hover {
            background: rgba(26, 26, 26, 0.05);
            transform: translateX(5px);
        }

        .city-name {
            font-size: 1.2rem;
            color: var(--ink-black);
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .city-reason {
            font-size: 0.95rem;
            color: var(--ink-gray);
            line-height: 1.5;
        }

        /* ========== 五行气象图 ========== */
        .five-elements-chart {
            background: linear-gradient(135deg,
                rgba(245, 240, 230, 0.95) 0%,
                rgba(232, 224, 208, 0.95) 100%);
            padding: 40px;
            border-radius: 20px;
            margin: 40px 0;
            border: 2px solid rgba(26, 26, 26, 0.15);
            position: relative;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.1),
                inset 0 0 60px rgba(26, 26, 26, 0.03);
        }

        .chart-title {
            font-size: 2rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 0.5em;
            font-weight: bold;
        }

        /* 主星展示 */
        .master-star {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(26, 26, 26, 0.03);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        .master-star::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(26, 26, 26, 0.05) 0%, transparent 70%);
            animation: rotateGentle 20s linear infinite;
        }

        @keyframes rotateGentle {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .master-star-char {
            font-size: 5rem;
            color: var(--ink-black);
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .master-star-element {
            font-size: 1.5rem;
            color: var(--ink-gray);
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .master-desc {
            font-size: 1.3rem;
            color: var(--ink-gray);
            line-height: 2;
            letter-spacing: 0.15em;
            font-style: italic;
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 四大梁柱 */
        .four-pillars {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 30px;
        }

        .pillar-card {
            background: rgba(245, 240, 230, 0.8);
            border-radius: 15px;
            padding: 25px 20px;
            border: 2px solid rgba(26, 26, 26, 0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .pillar-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: all 0.4s ease;
        }

        /* 财运用金色主题 */
        .pillar-card.wealth::before {
            background: linear-gradient(90deg, #d4af37, #f4cf67);
        }

        /* 婚姻用粉色主题 */
        .pillar-card.marriage::before {
            background: linear-gradient(90deg, #e91e63, #f48fb1);
        }

        /* 事业用青色主题 */
        .pillar-card.career::before {
            background: linear-gradient(90deg, #2e7d32, #66bb6a);
        }

        .pillar-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .pillar-icon {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 15px;
        }

        .pillar-title {
            font-size: 1.4rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 0.3em;
            font-weight: bold;
        }

        .pillar-desc {
            font-size: 1.1rem;
            color: var(--ink-gray);
            line-height: 1.8;
            letter-spacing: 0.1em;
            text-align: center;
            font-style: italic;
        }

        /* ========== 视差滚动效果 ========== */
        .parallax-container {
            perspective: 1000px;
            overflow-x: hidden;
        }

        .parallax-layer {
            transition: transform 0.3s ease-out;
        }

        .parallax-bg {
            transform: translateZ(-200px) scale(1.2);
        }

        .parallax-mid {
            transform: translateZ(-100px) scale(1.1);
        }

        .parallax-fg {
            transform: translateZ(0px);
        }

        /* ========== 动态标记效果 ========== */

        /* 金粉墨痕闪烁 - 财运专属 */
        .gold-sparkle {
            position: relative;
            display: inline-block;
        }

        .gold-sparkle::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: radial-gradient(circle at 30% 30%,
                rgba(212, 175, 55, 0.4) 0%,
                transparent 50%),
                radial-gradient(circle at 70% 70%,
                rgba(244, 207, 103, 0.4) 0%,
                transparent 50%);
            animation: sparkleGlow 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sparkleGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* 焦墨色调 - 忌讳专属 */
        .burnt-ink {
            color: #8b4513;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .burnt-ink::before {
            content: '✕';
            margin-right: 8px;
            color: #c62828;
        }

        /* ========== 宜忌指南（每日乾坤）========== */
        .daily-guide {
            background: linear-gradient(135deg,
                rgba(245, 240, 230, 0.9) 0%,
                rgba(232, 224, 208, 0.9) 100%);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            border: 2px solid rgba(26, 26, 26, 0.1);
            position: relative;
        }

        .daily-guide::before {
            content: '今日乾坤';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ink-black);
            color: var(--paper-light);
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 1rem;
            letter-spacing: 0.3em;
        }

        .daily-date {
            text-align: center;
            font-size: 1.2rem;
            color: var(--ink-gray);
            margin-bottom: 25px;
            letter-spacing: 0.2em;
        }

        .yi-ji-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .yi-section, .ji-section {
            padding: 25px;
            border-radius: 15px;
        }

        .yi-section {
            background: linear-gradient(135deg,
                rgba(46, 125, 50, 0.08) 0%,
                rgba(46, 125, 50, 0.03) 100%);
            border: 2px solid rgba(46, 125, 50, 0.2);
        }

        .ji-section {
            background: linear-gradient(135deg,
                rgba(198, 40, 40, 0.08) 0%,
                rgba(198, 40, 40, 0.03) 100%);
            border: 2px solid rgba(198, 40, 40, 0.2);
        }

        .yi-title, .ji-title {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.4em;
        }

        .yi-title {
            color: #2e7d32;
        }

        .ji-title {
            color: #c62828;
        }

        .yi-list, .ji-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .yi-item, .ji-item {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            font-weight: bold;
        }

        .yi-item {
            background: rgba(46, 125, 50, 0.12);
            color: #2e7d32;
            border: 1px solid rgba(46, 125, 50, 0.3);
        }

        .ji-item {
            background: rgba(198, 40, 40, 0.12);
            color: #c62828;
            border: 1px solid rgba(198, 40, 40, 0.3);
        }

        /* ========== 时间运势 ========== */
        .time-forecast-section {
            background: linear-gradient(135deg,
                rgba(255, 248, 220, 0.8) 0%,
                rgba(245, 240, 230, 0.8) 100%);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            border: 2px solid rgba(26, 26, 26, 0.1);
        }

        .forecast-title {
            font-size: 1.6rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 0.3em;
        }

        .forecast-cards {
            display: grid;
            gap: 20px;
        }

        .forecast-card {
            background: rgba(245, 240, 230, 0.7);
            border-radius: 15px;
            padding: 20px 25px;
            border-left: 4px solid var(--ink-black);
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateX(8px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .forecast-period {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
        }

        .forecast-period-name {
            font-size: 1.3rem;
            color: var(--ink-black);
            letter-spacing: 0.2em;
            font-weight: bold;
        }

        .forecast-period-score {
            font-size: 2rem;
            color: var(--ink-black);
            font-weight: bold;
        }

        .forecast-desc {
            font-size: 1.15rem;
            color: var(--ink-gray);
            line-height: 1.8;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }

        .forecast-advice {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            font-style: italic;
        }

        /* 滚动长卷效果 */
        .scroll-container {
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        .scroll-layer {
            transition: transform 0.1s ease-out;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .four-pillars {
                grid-template-columns: 1fr;
            }

            .yi-ji-container {
                grid-template-columns: 1fr;
            }

            .master-star-char {
                font-size: 3.5rem;
            }

            .pillar-card {
                padding: 20px 15px;
            }
        }

        /* 印章装饰 */
        .seal {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            border: 4px solid rgba(26, 26, 26, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: rgba(26, 26, 26, 0.4);
            transform: rotate(-15deg);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 0.3em;
            padding: 15px 10px;
            cursor: none;
            transition: all 0.4s ease;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(26, 26, 26, 0.02) 2px,
                    rgba(26, 26, 26, 0.02) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(26, 26, 26, 0.02) 2px,
                    rgba(26, 26, 26, 0.02) 4px
                );
        }

        .seal::before {
            content: '';
            position: absolute;
            inset: -2px;
            border: 2px solid rgba(26, 26, 26, 0.2);
            border-radius: 14px;
            opacity: 0.5;
        }

        .seal::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(26, 26, 26, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* 印章悬停效果 - 朱砂红光 */
        .seal:hover {
            border-color: rgba(200, 50, 50, 0.6);
            color: rgba(200, 50, 50, 0.8);
            transform: rotate(-15deg) scale(1.05);
            box-shadow:
                0 0 20px rgba(200, 50, 50, 0.3),
                0 0 40px rgba(200, 50, 50, 0.2),
                0 0 60px rgba(200, 50, 50, 0.1),
                inset 0 0 20px rgba(200, 50, 50, 0.1);
        }

        .seal:hover::before {
            border-color: rgba(200, 50, 50, 0.4);
            opacity: 1;
        }

        .seal:hover::after {
            opacity: 1;
            background: radial-gradient(circle at center, rgba(200, 50, 50, 0.15) 0%, transparent 70%);
        }

        /* 朱砂红光扩散动画 */
        .seal-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            pointer-events: none;
            overflow: hidden;
        }

        .seal-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(200, 50, 50, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.8s ease;
        }

        .seal:hover .seal-glow::before {
            width: 150px;
            height: 150px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 40px 20px;
            }

            .input-section, .result-section {
                padding: 30px 20px;
            }

            .input-section {
                min-height: auto;
                height: auto;
            }

            .date-inputs {
                height: auto;
                padding-bottom: 20px;
                min-height: auto;
            }

            .date-selector {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                transform: none !important;
                width: 100%;
                margin-bottom: 25px;
            }

            .qi-line {
                display: none;
            }

            .ancient-dropdown {
                width: 100%;
            }

            .eight-characters {
                font-size: 1.8rem;
                letter-spacing: 0.2em;
            }

            .city-grid {
                grid-template-columns: 1fr;
            }

            .result-seal {
                width: 70px;
                height: 70px;
                bottom: 20px;
                right: 20px;
            }

            .result-seal-text {
                font-size: 2rem;
            }

            .seal {
                width: 80px;
                height: 80px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .input-section {
                padding: 30px 15px;
            }

            .date-selector {
                margin-bottom: 20px;
            }

            .selector-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义光标 -->
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <div class="container">
        <header>
            <h1>墨迹命理</h1>
            <p class="subtitle">以墨为媒 · 探寻命运</p>
        </header>

        <section class="input-section">
            <div class="form-group">
                <label>生辰八字</label>
                <div class="date-inputs">
                    <!-- 气韵连接线 -->
                    <div class="qi-line qi-line-1"></div>
                    <div class="qi-line qi-line-2"></div>
                    <div class="qi-line qi-line-3"></div>

                    <!-- 年份选择器 -->
                    <div class="date-selector" data-type="year">
                        <div class="selector-label">年</div>
                        <div class="selector-value placeholder" id="yearValue">选择年份</div>
                        <div class="ancient-dropdown" id="yearDropdown"></div>
                    </div>

                    <!-- 月份选择器 -->
                    <div class="date-selector" data-type="month">
                        <div class="selector-label">月</div>
                        <div class="selector-value placeholder" id="monthValue">选择月份</div>
                        <div class="ancient-dropdown" id="monthDropdown"></div>
                    </div>

                    <!-- 日期选择器 -->
                    <div class="date-selector" data-type="day">
                        <div class="selector-label">日</div>
                        <div class="selector-value placeholder" id="dayValue">选择日期</div>
                        <div class="ancient-dropdown" id="dayDropdown"></div>
                    </div>

                    <!-- 时辰选择器 -->
                    <div class="date-selector" data-type="hour">
                        <div class="selector-label">时</div>
                        <div class="selector-value placeholder" id="hourValue">选择时辰</div>
                        <div class="ancient-dropdown" id="hourDropdown"></div>
                    </div>
                </div>

                <!-- 隐藏的原生select -->
                <select id="year" class="hidden-select"></select>
                <select id="month" class="hidden-select"></select>
                <select id="day" class="hidden-select"></select>
                <select id="hour" class="hidden-select"></select>
            </div>

            <button class="calculate-btn" id="calculateBtn">测算命理</button>
        </section>

        <section class="result-section" id="resultSection">
            <h2 class="result-title">命理解析</h2>
            <div class="eight-characters" id="eightCharacters"></div>
            <div class="fortune-content" id="fortuneContent"></div>
        </section>
    </div>

    <div class="seal">
        <span class="seal-glow"></span>
        <span>天机不可泄露</span>
    </div>

    <script>
        // 光标效果
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let trailCounter = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // 更新光标点位置
            cursorDot.style.left = mouseX - 3 + 'px';
            cursorDot.style.top = mouseY - 3 + 'px';

            // 创建墨烟拖尾
            trailCounter++;
            if (trailCounter % 3 === 0) {
                createInkTrail(mouseX, mouseY);
            }
        });

        // 平滑光标移动
        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.1;
            cursorY += (mouseY - cursorY) * 0.1;

            cursor.style.left = cursorX - 10 + 'px';
            cursor.style.top = cursorY - 10 + 'px';

            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // 创建墨烟拖尾
        function createInkTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'ink-trail';
            trail.style.left = x - 4 + 'px';
            trail.style.top = y - 4 + 'px';
            document.body.appendChild(trail);

            setTimeout(() => trail.remove(), 1500);
        }

        // 按钮悬停效果
        const calculateBtn = document.getElementById('calculateBtn');
        calculateBtn.addEventListener('mousemove', (e) => {
            const rect = calculateBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 创建墨滴效果
            if (Math.random() > 0.9) {
                createInkDrop(calculateBtn, x, y);
            }
        });

        function createInkDrop(container, x, y) {
            const drop = document.createElement('div');
            drop.className = 'ink-drop';
            drop.style.left = x - 50 + 'px';
            drop.style.top = y - 50 + 'px';
            container.appendChild(drop);

            setTimeout(() => drop.remove(), 1500);
        }

        // ====== 新的选择器系统 ======
        const yearSelect = document.getElementById('year');
        const monthSelect = document.getElementById('month');
        const daySelect = document.getElementById('day');
        const hourSelect = document.getElementById('hour');
        const currentYear = new Date().getFullYear();

        // 数据配置
        const monthData = [
            { value: 1, label: '正月' },
            { value: 2, label: '二月' },
            { value: 3, label: '三月' },
            { value: 4, label: '四月' },
            { value: 5, label: '五月' },
            { value: 6, label: '六月' },
            { value: 7, label: '七月' },
            { value: 8, label: '八月' },
            { value: 9, label: '九月' },
            { value: 10, label: '十月' },
            { value: 11, label: '冬月' },
            { value: 12, label: '腊月' }
        ];

        const hourData = [
            { value: 'zi', label: '子时' },
            { value: 'chou', label: '丑时' },
            { value: 'yin', label: '寅时' },
            { value: 'mao', label: '卯时' },
            { value: 'chen', label: '辰时' },
            { value: 'si', label: '巳时' },
            { value: 'wu', label: '午时' },
            { value: 'wei', label: '未时' },
            { value: 'shen', label: '申时' },
            { value: 'you', label: '酉时' },
            { value: 'xu', label: '戌时' },
            { value: 'hai', label: '亥时' }
        ];

        // 存储选中的值
        let selectedYear = null;
        let selectedMonth = null;
        let selectedDay = null;
        let selectedHour = null;

        // 初始化年份下拉
        function initYearDropdown() {
            const dropdown = document.getElementById('yearDropdown');
            dropdown.innerHTML = '';

            for (let year = currentYear; year >= 1920; year--) {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = year + '年';
                item.dataset.value = year;

                item.addEventListener('click', () => {
                    selectYear(year);
                });

                dropdown.appendChild(item);
            }
        }

        // 初始化月份下拉
        function initMonthDropdown() {
            const dropdown = document.getElementById('monthDropdown');
            dropdown.innerHTML = '';

            monthData.forEach(month => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = month.label;
                item.dataset.value = month.value;

                item.addEventListener('click', () => {
                    selectMonth(month.value, month.label);
                });

                dropdown.appendChild(item);
            });
        }

        // 初始化日期下拉
        function initDayDropdown() {
            const dropdown = document.getElementById('dayDropdown');
            dropdown.innerHTML = '';

            const year = selectedYear || currentYear;
            const month = selectedMonth || 1;
            const daysInMonth = new Date(year, month, 0).getDate();

            for (let day = 1; day <= daysInMonth; day++) {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = day + '日';
                item.dataset.value = day;

                item.addEventListener('click', () => {
                    selectDay(day);
                });

                dropdown.appendChild(item);
            }
        }

        // 初始化时辰下拉
        function initHourDropdown() {
            const dropdown = document.getElementById('hourDropdown');
            dropdown.innerHTML = '';

            hourData.forEach(hour => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = hour.label;
                item.dataset.value = hour.value;

                item.addEventListener('click', () => {
                    selectHour(hour.value, hour.label);
                });

                dropdown.appendChild(item);
            });
        }

        // 选择年份
        function selectYear(year) {
            selectedYear = year;
            const valueEl = document.getElementById('yearValue');
            valueEl.textContent = year + '年';
            valueEl.classList.remove('placeholder');

            const selector = valueEl.closest('.date-selector');
            selector.classList.add('selected');

            // 更新隐藏的select
            yearSelect.value = year;

            // 关闭下拉
            closeAllDropdowns();

            // 重新初始化日期（因为不同月份天数不同）
            if (selectedMonth) {
                initDayDropdown();
            }
        }

        // 选择月份
        function selectMonth(month, label) {
            selectedMonth = month;
            const valueEl = document.getElementById('monthValue');
            valueEl.textContent = label;
            valueEl.classList.remove('placeholder');

            const selector = valueEl.closest('.date-selector');
            selector.classList.add('selected');

            // 更新隐藏的select
            monthSelect.value = month;

            // 关闭下拉
            closeAllDropdowns();

            // 重新初始化日期
            initDayDropdown();
        }

        // 选择日期
        function selectDay(day) {
            selectedDay = day;
            const valueEl = document.getElementById('dayValue');
            valueEl.textContent = day + '日';
            valueEl.classList.remove('placeholder');

            const selector = valueEl.closest('.date-selector');
            selector.classList.add('selected');

            // 更新隐藏的select
            daySelect.value = day;

            // 关闭下拉
            closeAllDropdowns();
        }

        // 选择时辰
        function selectHour(hour, label) {
            selectedHour = hour;
            const valueEl = document.getElementById('hourValue');
            valueEl.textContent = label;
            valueEl.classList.remove('placeholder');

            const selector = valueEl.closest('.date-selector');
            selector.classList.add('selected');

            // 更新隐藏的select
            hourSelect.value = hour;

            // 关闭下拉
            closeAllDropdowns();
        }

        // 关闭所有下拉
        function closeAllDropdowns() {
            document.querySelectorAll('.ancient-dropdown').forEach(dropdown => {
                dropdown.classList.remove('show');
            });
        }

        // 绑定点击事件
        document.querySelectorAll('.date-selector').forEach(selector => {
            const valueEl = selector.querySelector('.selector-value');
            const type = selector.dataset.type;

            valueEl.addEventListener('click', (e) => {
                e.stopPropagation();

                // 关闭其他下拉
                document.querySelectorAll('.ancient-dropdown').forEach(dropdown => {
                    if (dropdown.id !== type + 'Dropdown') {
                        dropdown.classList.remove('show');
                    }
                });

                // 切换当前下拉
                const dropdown = document.getElementById(type + 'Dropdown');

                // 如果是日期选择器，每次点击都重新初始化（因为天数可能变化）
                if (type === 'day') {
                    initDayDropdown();
                }

                dropdown.classList.toggle('show');
            });
        });

        // 点击其他地方关闭下拉
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.date-selector')) {
                closeAllDropdowns();
            }
        });

        // 初始化所有下拉
        initYearDropdown();
        initMonthDropdown();
        initDayDropdown();
        initHourDropdown();

        // 天干地支
        const heavenlyStems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const earthlyBranches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];

                <div class="fortune-text scroll-layer parallax-fg" data-delay="3">

                        <div class="daily-date">${fortune.dailyGuide.date}</div>
                        <div class="yi-ji-container">
                            <div class="yi-section">
                                <div class="yi-title">宜</div>
                                <div class="yi-list">
                                    ${fortune.dailyGuide.yi.map(item => `<span class="yi-item">${item}</span>`).join('')}
                                </div>
                            </div>
                            <div class="ji-section">
                                <div class="ji-title">忌</div>
                                <div class="ji-list">
                                    ${fortune.dailyGuide.ji.map(item => `<span class="ji-item burnt-ink">${item}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fortune-text scroll-layer parallax-mid" data-delay="4">
                    <div class="city-recommendation">
                        <div class="city-rec-title">宜居之城</div>
                        <div class="city-rec-subtitle">
                            ${fortune.cities.weak ? `命缺${fortune.cities.weak}，宜往${fortune.cities.weak}方` : '五行均衡，四海为家'}
                        </div>
                        <div class="city-grid">
                            ${fortune.cities.recommendations.map(city => `
                                <div class="city-item">
                                    <div class="city-name">${city.name}</div>
                                    <div class="city-reason">${city.reason}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="fortune-text scroll-layer parallax-bg" data-delay="5">
                    <div class="analysis">
                        <div class="analysis-label">吉祥</div>
                        <div class="analysis-text">
                            幸运数字：<span class="gold-sparkle">${fortune.lucky.number}</span> |
                            幸运颜色：${fortune.lucky.color} |
                            吉祥方位：${fortune.lucky.direction}
                        </div>
                    </div>
                </div>

                <div class="fortune-text scroll-layer parallax-fg" data-delay="6">
                    <button class="recalculate-btn" onclick="resetCalculation()">重新测算</button>
                </div>
            `;

            // Assign the generated HTML to fortuneContent
            fortuneContent.innerHTML = chartHTML;

            // 启用视差滚动效果
            resultSection.classList.add('parallax-container');

            // 添加朱砂印章
            const existingSeal = document.querySelector('.result-seal');
            if (existingSeal) existingSeal.remove();

            const resultSeal = document.createElement('div');
            resultSeal.className = 'result-seal';
            resultSeal.innerHTML = '<span class="result-seal-text">天机</span>';
            resultSection.style.position = 'relative';
            resultSection.appendChild(resultSeal);

            // 印章点击事件
            resultSeal.addEventListener('click', () => {
                resultSeal.style.animation = 'sealFlash 0.6s ease';
                setTimeout(() => {
                    resultSeal.style.animation = '';
                }, 600);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 逐个显示文字
            const texts = document.querySelectorAll('.fortune-text');
            texts.forEach((text, index) => {
                setTimeout(() => {
                    text.classList.add('show');
                }, index * 800);
            });

            // 显示印章
            setTimeout(() => {
                resultSeal.classList.add('show');
            }, 2000);

            // 视差滚动效果
            initParallaxScroll(resultSection);

            // 滚动到结果区域
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }

        // 视差滚动初始化
        function initParallaxScroll(container) {
            let ticking = false;

            container.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        const scrollTop = container.scrollTop;
                        const layers = container.querySelectorAll('.scroll-layer');

                        layers.forEach(layer => {
                            const speed = layer.classList.contains('parallax-bg') ? 0.2 :
                                         layer.classList.contains('parallax-mid') ? 0.4 :
                                         0.6;
                            layer.style.transform = `translateY(${scrollTop * speed}px)`;
                        });

                        ticking = false;
                    });

                    ticking = true;
                }
            });
        }

        // 重新测算
        function resetCalculation() {
            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('show');
            resultSection.style.display = 'none';

            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 重置所有选择
            selectedYear = null;
            selectedMonth = null;
            selectedDay = null;
            selectedHour = null;

            // 重置显示
            document.getElementById('yearValue').textContent = '选择年份';
            document.getElementById('yearValue').classList.add('placeholder');

            document.getElementById('monthValue').textContent = '选择月份';
            document.getElementById('monthValue').classList.add('placeholder');

            document.getElementById('dayValue').textContent = '选择日期';
            document.getElementById('dayValue').classList.add('placeholder');

            document.getElementById('hourValue').textContent = '选择时辰';
            document.getElementById('hourValue').classList.add('placeholder');

            // 移除选中状态
            document.querySelectorAll('.date-selector').forEach(selector => {
                selector.classList.remove('selected');
            });

            // 重置隐藏的select
            yearSelect.value = '';
            monthSelect.value = '';
            daySelect.value = '';
            hourSelect.value = '';

            // 重新初始化日期下拉
            initDayDropdown();
        }

        // 测算按钮点击事件
        calculateBtn.addEventListener('click', () => {
            if (!selectedYear || !selectedMonth || !selectedDay || !selectedHour) {
                alert('请完整填写生辰信息');
                return;
            }

            const eightChars = calculateEightCharacters(selectedYear, selectedMonth, selectedDay, selectedHour);
            const fortune = generateFortune(eightChars, selectedYear, selectedMonth, selectedDay);
            showResult(eightChars, fortune);
        });
    </script>
</body>
</html>
