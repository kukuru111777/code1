<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨迹命理</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink-black: #1a1a1a;
            --ink-gray: #4a4a4a;
            --paper-light: #f5f0e6;
            --paper-medium: #e8e0d0;
            --ink-wash: rgba(26, 26, 26, 0.1);
        }

        body {
            font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', serif;
            background: var(--paper-light);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: none;
            position: relative;
        }

        /* 宣纸纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(ellipse at 20% 30%, var(--ink-wash) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--ink-wash) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 20%, var(--ink-wash) 0%, transparent 40%),
                radial-gradient(ellipse at 30% 80%, var(--ink-wash) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* 自定义光标 */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--ink-black) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: multiply;
            transition: transform 0.1s ease;
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--ink-black);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
        }

        /* 墨烟拖尾效果 */
        .ink-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, rgba(26, 26, 26, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: fadeTrail 1.5s ease-out forwards;
        }

        @keyframes fadeTrail {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(2);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--ink-black);
            font-weight: normal;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--ink-gray);
            letter-spacing: 0.2em;
        }

        /* 输入区域 */
        .input-section {
            background: rgba(232, 224, 208, 0.5);
            padding: 60px 40px;
            padding-bottom: 80px;
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(26, 26, 26, 0.1),
                0 10px 40px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
            position: relative;
            min-height: 480px;
            overflow: visible;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 1.3rem;
            color: var(--ink-gray);
            margin-bottom: 40px;
            letter-spacing: 0.15em;
            text-align: center;
        }

        /* 斜向布局容器 */
        .date-inputs {
            position: relative;
            width: 100%;
            height: 380px;
            min-height: 380px;
        }

        /* 选择器项 */
        .date-selector {
            position: absolute;
            width: 140px;
            text-align: center;
            cursor: none;
            transition: all 0.3s ease;
        }

        .date-selector:nth-child(4) {
            top: 0;
            left: calc(50% - 135px);
        }

        .date-selector:nth-child(5) {
            top: 80px;
            left: calc(50% - 45px);
        }

        .date-selector:nth-child(6) {
            top: 160px;
            left: calc(50% + 45px);
        }

        .date-selector:nth-child(7) {
            top: 240px;
            left: calc(50% + 135px);
        }

        /* 选择器标签 */
        .selector-label {
            font-size: 1rem;
            color: var(--ink-gray);
            margin-bottom: 8px;
            letter-spacing: 0.3em;
            opacity: 0.7;
        }

        /* 选择器值显示 */
        .selector-value {
            position: relative;
            font-size: 1.5rem;
            color: var(--ink-black);
            letter-spacing: 0.2em;
            padding: 10px 0;
            border-bottom: 2px solid rgba(74, 74, 74, 0.3);
            transition: all 0.3s ease;
            background: transparent;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selector-value::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--ink-black);
            transition: width 0.3s ease;
        }

        .selector-value:hover::after {
            width: 100%;
        }

        /* 已选中状态 */
        .date-selector.selected .selector-value {
            background: rgba(26, 26, 26, 0.05);
            border-radius: 8px 8px 0 0;
        }

        .date-selector.selected .selector-label {
            color: var(--ink-black);
            opacity: 1;
        }

        /* 占位符状态 */
        .selector-value.placeholder {
            color: rgba(74, 74, 74, 0.5);
            font-size: 1.2rem;
        }

        /* 气韵连接线 */
        .qi-line {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        .qi-line-1 {
            top: 40px;
            left: calc(50% - 75px);
            width: 80px;
            height: 50px;
            border-right: 1px dashed rgba(26, 26, 26, 0.15);
            border-bottom: 1px dashed rgba(26, 26, 26, 0.15);
            border-radius: 0 0 20px 0;
        }

        .qi-line-2 {
            top: 120px;
            left: calc(50% + 15px);
            width: 50px;
            height: 50px;
            border-right: 1px dashed rgba(26, 26, 26, 0.15);
            border-bottom: 1px dashed rgba(26, 26, 26, 0.15);
            border-radius: 0 0 20px 0;
        }

        .qi-line-3 {
            top: 200px;
            left: calc(50% + 105px);
            width: 50px;
            height: 50px;
            border-right: 1px dashed rgba(26, 26, 26, 0.15);
            border-bottom: 1px dashed rgba(26, 26, 26, 0.15);
            border-radius: 0 0 20px 0;
        }

        /* 古风弹窗选择列表 */
        .ancient-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: top;
            width: 200px;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(245, 240, 230, 0.98);
            border: 1px solid rgba(26, 26, 26, 0.2);
            border-radius: 0 0 10px 10px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(26, 26, 26, 0.02);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            cursor: none;
        }

        .ancient-dropdown.show {
            transform: translateX(-50%) scaleY(1);
            opacity: 1;
        }

        .dropdown-item {
            padding: 12px 20px;
            font-family: 'Ma Shan Zheng', 'KaiTi', serif;
            font-size: 1.1rem;
            color: var(--ink-gray);
            border-bottom: 1px solid rgba(26, 26, 26, 0.05);
            transition: all 0.2s ease;
            cursor: none;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: rgba(26, 26, 26, 0.05);
            color: var(--ink-black);
            padding-left: 25px;
        }

        .dropdown-item.selected {
            background: rgba(26, 26, 26, 0.08);
            color: var(--ink-black);
            font-weight: bold;
        }

        /* 隐藏原生select */
        .hidden-select {
            display: none;
        }

        /* 水墨晕染按钮 */
        .calculate-btn {
            width: 100%;
            padding: 20px;
            font-family: 'Ma Shan Zheng', 'KaiTi', serif;
            font-size: 1.8rem;
            color: var(--paper-light);
            background: var(--ink-black);
            border: none;
            border-radius: 50px;
            cursor: none;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            letter-spacing: 0.3em;
        }

        .calculate-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(245, 240, 230, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.6s ease;
        }

        .calculate-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .calculate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(26, 26, 26, 0.3);
        }

        /* 墨滴扩散动画 */
        .ink-drop {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(26, 26, 26, 0.2) 0%, transparent 70%);
            pointer-events: none;
            animation: inkSpread 1.5s ease-out forwards;
        }

        /* 印章闪烁动画 */
        @keyframes sealFlash {
            0%, 100% {
                transform: scale(1) rotate(-15deg);
                box-shadow:
                    0 4px 15px rgba(200, 50, 50, 0.4),
                    inset 0 0 20px rgba(0, 0, 0, 0.2);
            }
            50% {
                transform: scale(1.15) rotate(-15deg);
                box-shadow:
                    0 8px 30px rgba(200, 50, 50, 0.8),
                    0 0 60px rgba(200, 50, 50, 0.6),
                    inset 0 0 40px rgba(245, 240, 230, 0.4);
            }
        }

        @keyframes inkSpread {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            100% {
                width: 100px;
                height: 100px;
                opacity: 0;
            }
        }

        /* 结果显示区域 */
        .result-section {
            background: rgba(232, 224, 208, 0.5);
            padding: 50px;
            padding-bottom: 140px;
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(26, 26, 26, 0.1),
                0 10px 40px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            display: none;
            position: relative;
            overflow: visible;
        }

        .result-section.show {
            display: block;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 2rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 0.3em;
        }

        .fortune-content {
            font-size: 1.4rem;
            line-height: 2;
            color: var(--ink-gray);
            letter-spacing: 0.1em;
        }

        .fortune-text {
            opacity: 0;
            transform: translateY(10px);
            margin-bottom: 20px;
            filter: blur(8px);
        }

        .fortune-text.show {
            animation: inkBleed 2s ease forwards;
        }

        @keyframes inkBleed {
            0% {
                opacity: 0;
                filter: blur(8px);
                transform: translateY(10px) scale(0.98);
            }
            30% {
                opacity: 0.4;
                filter: blur(6px);
            }
            60% {
                opacity: 0.7;
                filter: blur(3px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0) scale(1);
            }
        }

        .eight-characters {
            text-align: center;
            font-size: 2.5rem;
            color: var(--ink-black);
            margin: 30px 0;
            letter-spacing: 0.5em;
            padding: 20px;
            background: rgba(245, 240, 230, 0.8);
            border-radius: 10px;
        }

        .analysis {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(74, 74, 74, 0.2);
        }

        .analysis-item {
            margin-bottom: 25px;
        }

        .analysis-label {
            font-size: 1.1rem;
            color: var(--ink-black);
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }

        .analysis-text {
            font-size: 1.2rem;
            color: var(--ink-gray);
            line-height: 1.8;
        }

        /* 朱砂印章 */
        .result-seal {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #c83232 0%, #a02828 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            box-shadow:
                0 4px 15px rgba(200, 50, 50, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
            opacity: 0;
            transform: scale(0.8) rotate(-15deg);
        }

        .result-seal.show {
            opacity: 1;
            transform: scale(1) rotate(-15deg);
        }

        .result-seal:hover {
            transform: scale(1.05) rotate(-15deg);
            box-shadow:
                0 6px 25px rgba(200, 50, 50, 0.6),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .result-seal-text {
            font-size: 2.5rem;
            color: #f5f0e6;
            font-family: 'Ma Shan Zheng', serif;
            letter-spacing: 0.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* 印章纹理 */
        .result-seal::before {
            content: '';
            position: absolute;
            inset: 3px;
            border: 2px solid rgba(245, 240, 230, 0.3);
            border-radius: 6px;
            pointer-events: none;
        }

        .result-seal::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.03) 3px,
                    rgba(0, 0, 0, 0.03) 6px
                );
            border-radius: 8px;
            pointer-events: none;
        }

        /* 五行损益展示 */
        .five-elements {
            background: rgba(245, 240, 230, 0.8);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .five-elements-title {
            font-size: 1.3rem;
            color: var(--ink-black);
            margin-bottom: 15px;
            letter-spacing: 0.3em;
        }

        .five-elements-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .element-item {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1rem;
            letter-spacing: 0.1em;
        }

        .element-gold { background: #f0e6d3; color: #8b7355; }
        .element-wood { background: #e8f5e9; color: #2e7d32; }
        .element-water { background: #e3f2fd; color: #1565c0; }
        .element-fire { background: #ffebee; color: #c62828; }
        .element-earth { background: #fff3e0; color: #ef6c00; }

        .five-elements-advice {
            font-size: 1.1rem;
            color: var(--ink-gray);
            line-height: 1.6;
            font-style: italic;
        }

        /* 流年运势 */
        .year-fortune {
            background: linear-gradient(135deg, rgba(255, 248, 220, 0.6) 0%, rgba(245, 240, 230, 0.6) 100%);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid var(--ink-black);
        }

        .year-fortune-text {
            font-size: 1.3rem;
            color: var(--ink-black);
            line-height: 1.8;
            letter-spacing: 0.1em;
        }

        /* 智慧格言 */
        .wisdom-quote {
            text-align: center;
            font-size: 1.5rem;
            color: var(--ink-black);
            margin: 30px 0;
            padding: 20px;
            background: rgba(232, 224, 208, 0.5);
            border-radius: 10px;
            letter-spacing: 0.2em;
            font-style: italic;
        }

        /* 重新测算按钮 */
        .recalculate-btn {
            width: 100%;
            padding: 15px;
            font-family: 'Ma Shan Zheng', 'KaiTi', serif;
            font-size: 1.3rem;
            color: var(--ink-gray);
            background: transparent;
            border: 2px solid var(--ink-gray);
            border-radius: 50px;
            cursor: none;
            margin-top: 20px;
            transition: all 0.3s ease;
            letter-spacing: 0.2em;
        }

        .recalculate-btn:hover {
            background: var(--ink-gray);
            color: var(--paper-light);
            transform: scale(1.02);
        }

        .recalculate-btn.hidden {
            display: none;
        }

        /* 城市推荐卡片 */
        .city-recommendation {
            background: linear-gradient(135deg,
                rgba(245, 240, 230, 0.7) 0%,
                rgba(232, 224, 208, 0.7) 100%);
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            border: 1px solid rgba(26, 26, 26, 0.1);
        }

        .city-rec-title {
            font-size: 1.4rem;
            color: var(--ink-black);
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.3em;
        }

        .city-rec-subtitle {
            font-size: 1rem;
            color: var(--ink-gray);
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
        }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .city-item {
            background: rgba(245, 240, 230, 0.9);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid var(--ink-black);
            transition: all 0.3s ease;
        }

        .city-item:hover {
            background: rgba(26, 26, 26, 0.05);
            transform: translateX(5px);
        }

        .city-name {
            font-size: 1.2rem;
            color: var(--ink-black);
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .city-reason {
            font-size: 0.95rem;
            color: var(--ink-gray);
            line-height: 1.5;
        }

        /* 印章装饰 */
        .seal {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            border: 4px solid rgba(26, 26, 26, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: rgba(26, 26, 26, 0.4);
            transform: rotate(-15deg);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 0.3em;
            padding: 15px 10px;
            cursor: none;
            transition: all 0.4s ease;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(26, 26, 26, 0.02) 2px,
                    rgba(26, 26, 26, 0.02) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(26, 26, 26, 0.02) 2px,
                    rgba(26, 26, 26, 0.02) 4px
                );
        }

        .seal::before {
            content: '';
            position: absolute;
            inset: -2px;
            border: 2px solid rgba(26, 26, 26, 0.2);
            border-radius: 14px;
            opacity: 0.5;
        }

        .seal::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(26, 26, 26, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* 印章悬停效果 - 朱砂红光 */
        .seal:hover {
            border-color: rgba(200, 50, 50, 0.6);
            color: rgba(200, 50, 50, 0.8);
            transform: rotate(-15deg) scale(1.05);
            box-shadow:
                0 0 20px rgba(200, 50, 50, 0.3),
                0 0 40px rgba(200, 50, 50, 0.2),
                0 0 60px rgba(200, 50, 50, 0.1),
                inset 0 0 20px rgba(200, 50, 50, 0.1);
        }

        .seal:hover::before {
            border-color: rgba(200, 50, 50, 0.4);
            opacity: 1;
        }

        .seal:hover::after {
            opacity: 1;
            background: radial-gradient(circle at center, rgba(200, 50, 50, 0.15) 0%, transparent 70%);
        }

        /* 朱砂红光扩散动画 */
        .seal-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            pointer-events: none;
            overflow: hidden;
        }

        .seal-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(200, 50, 50, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.8s ease;
        }

        .seal:hover .seal-glow::before {
            width: 150px;
            height: 150px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 40px 20px;
            }

            .input-section, .result-section {
                padding: 30px 20px;
            }

            .input-section {
                min-height: auto;
                height: auto;
            }

            .date-inputs {
                height: auto;
                padding-bottom: 20px;
                min-height: auto;
            }

            .date-selector {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                transform: none !important;
                width: 100%;
                margin-bottom: 25px;
            }

            .qi-line {

        let trailCounter = 0;

            mouseX = e.clientX;
            mouseY = e.clientY;

            cursorDot.style.left = mouseX - 3 + 'px';
            cursorDot.style.top = mouseY - 3 + 'px';

                createInkTrail(mouseX, mouseY);

        // 平滑光标移动
        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.1;
            cursorY += (mouseY - cursorY) * 0.1;

            cursor.style.left = cursorX - 10 + 'px';
            cursor.style.top = cursorY - 10 + 'px';

            requestAnimationFrame(animateCursor);

        // 创建墨烟拖尾

            const trail = document.createElement('div');

            trail.style.top = y - 4 + 'px';
            document.body.appendChild(trail);

            setTimeout(() => trail.remove(), 1500);

            drop.style.top = y - 50 + 'px';

            setTimeout(() => drop.remove(), 1500);

                '大智若愚，大巧若拙，藏拙于巧，用晦而明。'
            ][seed % 5];

            return {
                personality: ancientVerdicts.personality[getIndex(ancientVerdicts.personality)],
                career: ancientVerdicts.career[getIndex(ancientVerdicts.career)],
                love: ancientVerdicts.love[getIndex(ancientVerdicts.love)],
                health: ancientVerdicts.health[getIndex(ancientVerdicts.health)],
                fiveElements: {
                    analysis: fiveElementAnalysis,
                    advice: fiveElementAdvice[fiveElementAnalysis.weak]
                },
                yearFortune: yearVerdicts[seed % yearVerdicts.length],
                wisdom: wisdomVerdict,
                cities: recommendCities(fiveElementAnalysis.weak, fiveElementAnalysis.strong),
                lucky: {
                    number: (seed % 9) + 1,
                    color: ['红', '蓝', '绿', '黄', '紫', '白', '黑', '金', '银'][seed % 9],
                    direction: ['东', '南', '西', '北', '东南', '西南', '东北', '西北'][seed % 8]
                }
            };
        }

        // 显示结果（带动画）
        function showResult(eightChars, fortune) {
            const resultSection = document.getElementById('resultSection');
            const eightCharacters = document.getElementById('eightCharacters');
            const fortuneContent = document.getElementById('fortuneContent');

            resultSection.classList.add('show');

            eightCharacters.innerHTML = `
                ${eightChars.year} ${eightChars.month} ${eightChars.day} ${eightChars.hour}
            `;

            // 五行元素HTML
            const fiveElementsHTML = Object.entries(fortune.fiveElements.analysis.counts)
                .map(([element, count]) => {
                    const classMap = {
                        '金': 'element-gold',
                        '木': 'element-wood',
                        '水': 'element-water',
                        '火': 'element-fire',
                        '土': 'element-earth'
                    };
                    return `<span class="element-item ${classMap[element]}">${element}${count}</span>`;
                }).join('');

            fortuneContent.innerHTML = `
                <div class="fortune-text" data-delay="0">
                    <div class="five-elements">
                        <div class="five-elements-title">五行损益</div>
                        <div class="five-elements-grid">${fiveElementsHTML}</div>
                        <div class="five-elements-advice">${fortune.fiveElements.analysis.balance} · ${fortune.fiveElements.advice}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="1">
                    <div class="year-fortune">
                        <div class="year-fortune-text">${fortune.yearFortune}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="2">
                    <div class="wisdom-quote">${fortune.wisdom}</div>
                </div>
                <div class="fortune-text" data-delay="3">
                    <div class="city-recommendation">
                        <div class="city-rec-title">宜居之城</div>
                        <div class="city-rec-subtitle">
                            ${fortune.cities.weak ? `命缺${fortune.cities.weak}，宜往${fortune.cities.weak}方` : '五行均衡，四海为家'}
                        </div>
                        <div class="city-grid">
                            ${fortune.cities.recommendations.map(city => `
                                <div class="city-item">
                                    <div class="city-name">${city.name}</div>
                                    <div class="city-reason">${city.reason}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="4">
                    <div class="analysis-item">
                        <div class="analysis-label">属相 · ${eightChars.zodiac}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="5">
                    <div class="analysis-item">
                        <div class="analysis-label">性格</div>
                        <div class="analysis-text">${fortune.personality}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="6">
                    <div class="analysis-item">
                        <div class="analysis-label">事业</div>
                        <div class="analysis-text">${fortune.career}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="7">
                    <div class="analysis-item">
                        <div class="analysis-label">感情</div>
                        <div class="analysis-text">${fortune.love}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="8">
                    <div class="analysis-item">
                        <div class="analysis-label">健康</div>
                        <div class="analysis-text">${fortune.health}</div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="9">
                    <div class="analysis">
                        <div class="analysis-label">吉祥</div>
                        <div class="analysis-text">
                            幸运数字：${fortune.lucky.number} | 幸运颜色：${fortune.lucky.color} | 吉祥方位：${fortune.lucky.direction}
                        </div>
                    </div>
                </div>
                <div class="fortune-text" data-delay="10">
                    <button class="recalculate-btn" onclick="resetCalculation()">重新测算</button>
                </div>
            `;

            // 添加朱砂印章
            const existingSeal = document.querySelector('.result-seal');
            if (existingSeal) existingSeal.remove();

            const resultSeal = document.createElement('div');
            resultSeal.className = 'result-seal';
            resultSeal.innerHTML = '<span class="result-seal-text">天机</span>';
            resultSection.style.position = 'relative';
            resultSection.appendChild(resultSeal);

            // 印章点击事件
            resultSeal.addEventListener('click', () => {
                // 创建闪烁效果
                resultSeal.style.animation = 'sealFlash 0.6s ease';
                setTimeout(() => {
                    resultSeal.style.animation = '';
                }, 600);

                // 滚动回顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 逐个显示文字
            const texts = document.querySelectorAll('.fortune-text');
            texts.forEach((text, index) => {
                setTimeout(() => {
                    text.classList.add('show');
                }, index * 800);
            });

            // 显示印章
            setTimeout(() => {
                resultSeal.classList.add('show');
            }, 2000);

            // 滚动到结果区域
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }

        // 重新测算
        function resetCalculation() {
            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('show');
            resultSection.style.display = 'none';

            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 重置所有选择
            selectedYear = null;
            selectedMonth = null;
            selectedDay = null;
            selectedHour = null;

            // 重置显示
            document.getElementById('yearValue').textContent = '选择年份';
            document.getElementById('yearValue').classList.add('placeholder');

            document.getElementById('monthValue').textContent = '选择月份';
            document.getElementById('monthValue').classList.add('placeholder');

            document.getElementById('dayValue').textContent = '选择日期';
            document.getElementById('dayValue').classList.add('placeholder');

            document.getElementById('hourValue').textContent = '选择时辰';
            document.getElementById('hourValue').classList.add('placeholder');

            // 移除选中状态
            document.querySelectorAll('.date-selector').forEach(selector => {
                selector.classList.remove('selected');
            });

            // 重置隐藏的select
            yearSelect.value = '';
            monthSelect.value = '';
            daySelect.value = '';
            hourSelect.value = '';

            // 重新初始化日期下拉
            initDayDropdown();
        }

        // 测算按钮点击事件
        calculateBtn.addEventListener('click', () => {
            if (!selectedYear || !selectedMonth || !selectedDay || !selectedHour) {
                alert('请完整填写生辰信息');
                return;
            }

            const eightChars = calculateEightCharacters(selectedYear, selectedMonth, selectedDay, selectedHour);
            const fortune = generateFortune(eightChars, selectedYear, selectedMonth, selectedDay);
            showResult(eightChars, fortune);
        });
    </script>
</body>
</html>
